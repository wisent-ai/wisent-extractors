name: Publish to PyPI
on:
  release:
    types: [published]
jobs:
  publish:
    runs-on: ubuntu-latest
    # Intentionally NOT granting id-token: write. The newer
    # pypa/gh-action-pypi-publish auto-prefers OIDC trusted publishing when
    # the OIDC token is available, but this PyPI project is configured for
    # API-token auth (PYPI_API_TOKEN secret), not trusted publishing. Without
    # id-token: write the action falls through to password mode.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
